<!DOCTYPE html>
<html>
<head>
    <title>Submit Ticket</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body {
            font-family: var(--font-sans);
            background-color: var(--bg-app);
            color: var(--text-main);
            transition: all 0.3s ease;
        }
        [data-theme="dark"] header {
            background: linear-gradient(135deg, #111827 0%, var(--bg-card) 100%);
        }
        header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white;
            padding: 24px 30px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-md);
        }
        h1 { font-size: 24px; font-weight: 700; }
        .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }
        .form-section {
            background: var(--bg-card);
            padding: 40px;
            border-radius: 16px;
            box-shadow: var(--shadow-lg);
            border: 1px solid var(--border-dim);
            transition: all 0.3s ease;
        }
        .form-section h2 { color: var(--text-main); margin-bottom: 30px; font-size: 22px; font-weight: 700; }
        .form-group { margin-bottom: 25px; }
        label { display: block; margin-bottom: 10px; color: var(--text-main); font-weight: 600; font-size: 15px; }
        textarea {
            width: 100%; padding: 16px; border: 1px solid var(--border-dim); border-radius: 12px;
            font-size: 15px; font-family: inherit;
            min-height: 160px; resize: vertical; transition: all 0.3s;
            background-color: var(--bg-input);
            color: var(--text-main);
            line-height: 1.6;
        }
        textarea:focus { outline: none; border-color: var(--border-focus); box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.1); }
        button {
            background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%);
            color: white; border: none; padding: 14px 40px; border-radius: 12px;
            cursor: pointer; font-size: 16px; font-weight: 700;
            transition: all 0.2s;
            box-shadow: var(--shadow-md);
        }
        button:hover { transform: translateY(-2px); box-shadow: var(--shadow-lg); }
        
        .nav-links { margin-top: 30px; text-align: center; }
        .nav-links a { 
            color: var(--primary); 
            text-decoration: none; 
            font-size: 14px; 
            font-weight: 600;
            transition: color 0.2s;
        }
        .nav-links a:hover { color: var(--primary-hover); text-decoration: underline; }

        /* Skeleton Loading */
        .skeleton-loader {
            display: none;
            margin-top: 20px;
        }
        .skeleton-loader .line {
            height: 12px;
            margin-bottom: 10px;
            background: linear-gradient(90deg, var(--bg-app) 25%, var(--bg-card) 50%, var(--bg-app) 75%);
            background-size: 200% 100%;
            animation: loading 1.5s infinite;
            border-radius: 4px;
        }
        @keyframes loading {
            0% { background-position: 200% 0; }
            100% { background-position: -200% 0; }
        }
    </style>
</head>
<body>
    <header>
        <a href="{{ url_for('dashboard') }}" class="header-left" style="text-decoration:none; color:inherit; display:flex; align-items:center; gap:25px;">
            <h1 style="font-size: 20px;"><i class="fa-solid fa-rocket" style="margin-right: 8px;"></i>Smarties System</h1>
            <div class="user-info" style="border-left: 1px solid rgba(255,255,255,0.3); padding-left: 20px; text-align: left;">
                <div style="font-size: 13px; opacity: 0.9;">Welcome, <strong>{{ session.username }}</strong></div>
                <div style="margin-top: 2px;"><span class="badge" style="background-color: rgba(255,255,255,0.2); padding: 2px 8px; border-radius: 20px; font-size: 11px; font-weight: 600;">{{ session.role.upper() }}</span></div>
            </div>
        </a>
        <a href="{{ url_for('logout') }}" class="logout-btn" style="background-color: rgba(255,255,255,0.15); color:white; border:1px solid rgba(255,255,255,0.4); padding:8px 18px; border-radius:8px; text-decoration:none; font-size:13px; font-weight:600;">Logout</a>
    </header>

    <div class="container">
        <div class="form-section">
            <h2><i class="fa-solid fa-ticket" style="margin-right: 8px;"></i>Submit a Ticket</h2>
            
            <form action="/submit" method="POST" enctype="multipart/form-data" id="ticket-form">
                <div class="form-group">
                    <label for="ticket">Describe your issue:</label>
                    <textarea name="ticket" id="ticket" placeholder="Enter your issue or request..." required></textarea>
                </div>
                <div class="form-group">
                    <label for="attachment"><i class="fa-solid fa-paperclip"></i> Attachments (Optional):</label>
                    <input type="file" name="attachment" id="attachment" style="background: var(--bg-input); color: var(--text-main); width: 100%; padding: 10px; border-radius: 8px; border: 1px solid var(--border-dim); font-size: 13px;">
                    <small style="color: var(--text-muted); font-size: 11px; display: block; margin-top: 5px;">Supported: PNG, JPG, PDF, TXT, LOG (Max 16MB)</small>
                </div>
                <button type="submit" id="submit-btn">Submit Ticket</button>
            </form>

            <div class="skeleton-loader" id="loader">
                <div class="line" style="width: 100%;"></div>
                <div class="line" style="width: 80%;"></div>
                <div class="line" style="width: 90%;"></div>
                <p style="text-align: center; font-size: 12px; color: var(--text-muted); margin-top: 10px;">AI is analyzing your request and preparing a response...</p>
            </div>
            
            <div class="nav-links">
                <a href="{{ url_for('view') }}">View My Tickets</a>
                <a href="{{ url_for('logout') }}">Logout</a>
            </div>
        </div>
    </div>
    <script>
        document.getElementById('ticket-form').onsubmit = function() {
            document.getElementById('submit-btn').style.display = 'none';
            document.getElementById('loader').style.display = 'block';
        };
    </script>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
