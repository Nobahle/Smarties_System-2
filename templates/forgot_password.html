<!DOCTYPE html>
<html>
<head>
    <title>Smarties System - Forgot Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/theme.css') }}">
    <style>
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family: var(--font-sans); /* background-color: var(--bg-app); */ min-height: 100vh; display: flex; justify-content: center; align-items: center; color: var(--text-main); padding: 20px; }
        .container { background-color: var(--bg-card); border: 1px solid var(--border-dim); border-radius: 12px; box-shadow: var(--shadow-lg); width: 100%; max-width: 450px; padding: 40px; border: 1px solid var(--border-dim); }
        .logo { text-align: center; margin-bottom: 30px; }
        .logo i { font-size: 50px; color: var(--primary); margin-bottom: 15px; }
        h1 { font-size: 24px; margin-bottom: 10px; color: var(--text-main); font-weight: 700; }
        p { color: var(--text-muted); font-size: 14px; margin-bottom: 30px; line-height: 1.5; }
        .form-group { margin-bottom: 20px; }
        label { display: block; margin-bottom: 8px; font-weight: 500; font-size: 14px; color: var(--text-main); }
        input { width: 100%; padding: 12px; background-color: var(--bg-input); border: 1px solid var(--border-dim); border-radius: 8px; color: var(--text-main); font-size: 14px; transition: all 0.2s; }
        input:focus { outline: none; border-color: var(--primary); box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1); }
        button { width: 100%; padding: 12px; background: linear-gradient(135deg, var(--primary) 0%, var(--primary-hover) 100%); color: white; border: none; border-radius: 8px; font-size: 16px; font-weight: 600; cursor: pointer; transition: all 0.2s; margin-top: 10px; }
        button:hover { transform: translateY(-1px); box-shadow: var(--shadow-md); }
        .error { background-color: rgba(239, 68, 68, 0.1); color: var(--error); padding: 12px; border-radius: 8px; margin-bottom: 20px; font-size: 13px; border: 1px solid var(--error); display: flex; align-items: center; gap: 10px; }
        .footer { text-align: center; margin-top: 25px; font-size: 14px; color: var(--text-muted); }
        .footer a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .footer a:hover { text-decoration: underline; }
    </style>
</head>
<body class="auth-page">
    <div class="container">
        <div class="logo">
            <i class="fas fa-user-shield"></i>
            <h1>Account Recovery</h1>
            <p>Enter your username and the email address associated with your account to verify your identity.</p>
        </div>

        {% if error %}
            <div class="error"><i class="fas fa-exclamation-triangle"></i> {{ error }}</div>
        {% endif %}

        <form method="POST">
            <div class="form-group">
                <label for="username">Username</label>
                <input type="text" id="username" name="username" placeholder="Username" required>
            </div>
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="Email" required>
            </div>
            <button type="submit">Verify Identity</button>
        </form>

        <div class="footer">
             Remember your password? <a href="{{ url_for('login') }}">Back to Login</a>
        </div>
    </div>
    <script src="{{ url_for('static', filename='js/theme.js') }}"></script>
</body>
</html>
